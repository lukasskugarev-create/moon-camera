workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign || true
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build \
            CONFIGURATION_BUILD_DIR=build/ios/iphoneos
      - name: Create IPA
        script: |
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload/
    artifacts:
      - app.ipa