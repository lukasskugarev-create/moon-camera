workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Fix signing
        script: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' ios/Runner.xcodeproj/project.pbxproj
      - name: Build iOS
        script: flutter build ios --release --no-codesign
      - name: Create IPA
        script: |
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload/
    artifacts:
      - app.ipa