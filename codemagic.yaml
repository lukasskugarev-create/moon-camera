workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS
        script: flutter build ios --release --no-codesign
      - name: Create IPA
        script: |
          mkdir -p build/ios/archive/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/archive/Payload/
          cd build/ios/archive
          zip -r app.ipa Payload/
    artifacts:
      - build/ios/archive/app.ipa